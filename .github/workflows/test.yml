name: test
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  node-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm install
      - run: npm test
